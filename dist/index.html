            margin-top: 0.75rem;
        }

        .cl-backlog-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.65rem 1rem;
            border: 1px solid #f3f4f6;
            border-radius: 0.85rem;
            background: white;
            color: #6b7280;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .cl-backlog-toggle:hover {
            background: #f9fafb;
        }

        .cl-backlog-badge {
            font-size: 0.65rem;
            font-weight: 900;
            padding: 0.1rem 0.45rem;
            border-radius: 1rem;
            background: #fef2f2;
            color: #ef4444;
        }

        .cl-backlog-badge--amber {
            background: #fffbeb;
            color: #d97706;
        }

        .cl-backlog-list {
            margin-top: 0.35rem;
            background: white;
            border: 1px solid #f3f4f6;
            border-radius: 0.85rem;
            overflow: hidden;
        }

        /* Idea task items */
        .cl-idea-task {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.85rem;
            transition: background 0.12s;
        }

        .cl-idea-task:hover {
            background: #f9fafb;
        }

        .cl-idea-task--done {
            opacity: 0.5;
        }

        .cl-idea-task--urgent {
            background: #fef2f2;
        }

        .cl-idea-task--urgent:hover {
            background: #fee2e2;
        }

        .cl-idea-task-check {
            flex-shrink: 0;
            width: 1.4rem;
            height: 1.4rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #d1d5db;
            background: white;
            cursor: pointer;
            transition: all 0.15s;
            color: transparent;
            padding: 0;
        }

        .cl-idea-task-check:hover:not(:disabled) {
            border-color: #16a34a;
            background: rgba(22, 163, 74, 0.05);
        }

        .cl-idea-task-check--done {
            border-color: #16a34a;
            background: #16a34a;
            color: white;
        }

        .cl-idea-task-body {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .cl-idea-task-text {
            font-size: 0.8rem;
            font-weight: 500;
            color: #374151;
            word-break: break-word;
        }

        .cl-idea-task-text--done {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .cl-idea-task-link {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.1rem 0.4rem;
            border-radius: 0.3rem;
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            text-decoration: none;
            background: var(--primary-shadow, #eef2ff);
            color: var(--primary, #6366f1);
            transition: opacity 0.15s;
            width: fit-content;
        }

        .cl-idea-task-link:hover {
            opacity: 0.8;
        }

        /* ===== WEEK VIEW ===== */
        .cl-week-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem 2rem 4rem;
        }

        .cl-week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
        }

        .cl-week-col {
            background: white;
            border: 1px solid #f3f4f6;
            border-radius: 1rem;
            padding: 0.85rem 0.65rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.65rem;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 10rem;
        }

        .cl-week-col:hover {
            border-color: var(--primary, #6366f1);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.08);
            transform: translateY(-2px);
        }

        .cl-week-col--today {
            border: 2px solid var(--primary, #6366f1);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
        }

        .cl-week-col--past {
            opacity: 0.65;
        }

        .cl-week-col--past:hover {
            opacity: 1;
        }

        .cl-week-col-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.15rem;
        }

        .cl-week-col-weekday {
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #9ca3af;
        }

        .cl-week-col--today .cl-week-col-weekday {
            color: var(--primary, #6366f1);
        }

        .cl-week-col-date {
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 900;
            color: #374151;
            border-radius: 0.5rem;
        }

        .cl-week-col-date--today {
            background: var(--primary, #6366f1);
            color: white;
        }

        /* Progress ring */
        .cl-week-col-progress {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cl-week-ring {
            transform: rotate(-90deg);
        }

        .cl-week-ring-label {
            position: absolute;
            font-size: 0.55rem;
            font-weight: 900;
            color: #6b7280;
        }

        /* Mini task list in week */
        .cl-week-col-tasks {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .cl-week-task {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.35rem;
            border-radius: 0.4rem;
            transition: background 0.1s;
        }

        .cl-week-task:hover {
            background: #f9fafb;
        }

        .cl-week-task--done {
            opacity: 0.45;
        }

        .cl-week-task--urgent {
            background: #fef2f2;
        }

        .cl-week-task-check {
            flex-shrink: 0;
            width: 1rem;
            height: 1rem;
            border-radius: 50%;
            border: 1.5px solid #d1d5db;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s;
            padding: 0;
            color: transparent;
        }

        .cl-week-task-check:hover {
            border-color: var(--primary, #6366f1);
        }

        .cl-week-task-check--done {
            border-color: #16a34a;
            background: #16a34a;
            color: white;
        }

        .cl-week-task-text {
            flex: 1;
            font-size: 0.65rem;
            font-weight: 500;
            color: #374151;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            line-height: 1.3;
        }

        .cl-week-task-text--done {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .cl-week-task-more {
            font-size: 0.6rem;
            font-weight: 700;
            color: var(--primary, #6366f1);
            text-align: center;
            padding: 0.2rem;
        }

        .cl-week-task-empty {
            font-size: 0.7rem;
            color: #d1d5db;
            text-align: center;
            padding: 0.5rem;
        }

        /* ===== TASK DETAIL MODAL ===== */
        .tdm-backdrop {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            animation: tdmFadeIn 0.2s ease;
        }

        @keyframes tdmFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .tdm-modal {
            background: white;
            border-radius: 1.25rem;
            width: 100%;
            max-width: 540px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            animation: tdmSlideUp 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes tdmSlideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .tdm-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #f3f4f6;
        }

        .tdm-header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .tdm-check {
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 50%;
            border: 2.5px solid #d1d5db;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0;
            color: transparent;
            flex-shrink: 0;
        }

        .tdm-check:hover {
            border-color: var(--primary, #6366f1);
            background: rgba(99, 102, 241, 0.05);
        }

        .tdm-check--done {
            border-color: #16a34a;
            background: #16a34a;
            color: white;
        }

        .tdm-header-date {
            font-size: 0.75rem;
            font-weight: 700;
            color: #6b7280;
        }

        .tdm-header-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tdm-saving {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--primary, #6366f1);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            animation: tdmPulse 1s ease-in-out infinite;
        }

        @keyframes tdmPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .tdm-close {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 0.6rem;
            border: none;
            background: transparent;
            color: #9ca3af;
            cursor: pointer;
            transition: all 0.15s;
            padding: 0;
        }

        .tdm-close:hover {
            background: #f3f4f6;
            color: #374151;
        }

        /* Title */
        .tdm-title-section {
            padding: 1rem 1.25rem 0.5rem;
        }

        .tdm-title-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1.1rem;
            font-weight: 700;
            color: #111827;
            font-family: inherit;
            resize: none;
            line-height: 1.4;
            background: transparent;
            overflow: hidden;
            box-sizing: border-box;
        }

        .tdm-title-input--done {
            text-decoration: line-through;
            color: #9ca3af;
        }

        .tdm-title-input:focus {
            background: #f9fafb;
            border-radius: 0.5rem;
            padding: 0.35rem 0.5rem;
            margin: -0.35rem -0.5rem;
        }

        /* Meta chips */
        .tdm-meta {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.25rem 1.25rem 0.75rem;
            flex-wrap: wrap;
        }

        .tdm-meta-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.65rem;
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
            background: white;
            font-size: 0.7rem;
            font-weight: 700;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            white-space: nowrap;
            text-decoration: none;
        }

        .tdm-meta-chip:hover {
            border-color: #d1d5db;
            background: #f9fafb;
        }

        .tdm-meta-chip--urgent {
            border-color: #fca5a5;
            background: #fef2f2;
            color: #ef4444;
        }

        .tdm-meta-chip--idea {
            border-color: var(--primary, #6366f1);
            background: var(--primary-shadow, #eef2ff);
            color: var(--primary, #6366f1);
        }

        .tdm-meta-chip--link {
            border-color: var(--primary, #6366f1);
            color: var(--primary, #6366f1);
            font-size: 0.65rem;
            text-decoration: none;
        }

        .tdm-meta-chip--link:hover {
            background: var(--primary-shadow, #eef2ff);
        }

        .tdm-meta-tag-wrap {
            position: relative;
        }

        .tdm-tag-picker {
            position: absolute;
            left: 0;
            top: 100%;
            z-index: 50;
            min-width: 220px;
            max-height: 220px;
            overflow-y: auto;
            margin-top: 0.25rem;
        }

        /* Fields */
        .tdm-field {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.25rem;
        }

        .tdm-field-label {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.7rem;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
            min-width: 5.5rem;
        }

        .tdm-field-date {
            flex: 1;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 0.35rem 0.65rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

        .tdm-field-date:focus {
            border-color: var(--primary, #6366f1);
        }

        .tdm-field-clear {
            font-size: 0.65rem;
            font-weight: 700;
            color: #9ca3af;
            background: none;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            padding: 0.2rem 0.4rem;
            border-radius: 0.3rem;
            transition: all 0.15s;
        }

        .tdm-field-clear:hover {
            background: #fef2f2;
            color: #ef4444;
        }

        /* Notes */
        .tdm-notes-section {
            padding: 0.75rem 1.25rem;
        }

        .tdm-notes-input {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 0.65rem;
            padding: 0.65rem 0.85rem;
            font-size: 0.825rem;
            font-weight: 500;
            color: #374151;
            font-family: inherit;
            resize: vertical;
            outline: none;
            transition: all 0.2s;
            line-height: 1.6;
            min-height: 5rem;
            margin-top: 0.35rem;
        }

        .tdm-notes-input::placeholder {
            color: #c4c8cf;
            font-style: italic;
        }

        .tdm-notes-input:focus {
            border-color: var(--primary, #6366f1);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.08);
        }

        /* Subtasks */
        .tdm-subtasks {
            padding: 0.5rem 1.25rem;
        }

        .tdm-subtask-list {
            margin-top: 0.35rem;
            border: 1px solid #f3f4f6;
            border-radius: 0.65rem;
            overflow: hidden;
        }

        .tdm-subtask {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.45rem 0.75rem;
            font-size: 0.8rem;
            font-weight: 500;
            color: #374151;
            border-bottom: 1px solid #f9fafb;
        }

        .tdm-subtask:last-child {
            border-bottom: none;
        }

        .tdm-subtask--done {
            opacity: 0.5;
        }

        .tdm-subtask-check {
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 50%;
            border: 2px solid #d1d5db;
